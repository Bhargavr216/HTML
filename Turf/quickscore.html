<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Turf Score</title>
    <style>
      :root {
        font-family: "Inter", system-ui, sans-serif;
        color: #f8fbff;
        background: #0b1221;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(circle at top, #161d37, #05090f 65%);
      }
      .card {
        width: min(540px, 100%);
        background: rgba(8, 11, 20, 0.95);
        border-radius: 28px;
        padding: 2rem;
        box-shadow: 0 30px 60px rgba(3, 5, 15, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      .title {
        font-size: clamp(2rem, 4vw, 2.6rem);
        letter-spacing: 0.05em;
        margin: 0;
      }
      .subtitle {
        margin: 0;
        color: #8da1c9;
        font-size: 0.95rem;
      }
      .score-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
      .panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 1rem;
        border-radius: 16px;
        text-align: center;
      }
      .panel h3 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8da1c9;
      }
      .panel p {
        margin: 0.35rem 0 0;
        font-size: 1.9rem;
        font-weight: 600;
      }
      .panel span {
        display: block;
        font-size: 0.85rem;
        color: #9cb3d5;
        margin-top: 0.35rem;
      }
      .overs-control {
        margin-bottom: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
      }

      .overs-control label {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #9cb3d5;
      }

      .overs-input-row {
        margin-top: 0.4rem;
        display: flex;
        gap: 0.6rem;
      }

      .overs-input-row select {
        flex: 1;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
        padding: 0.55rem 0.75rem;
        font-size: 1rem;
      }

      .overs-input-row button {
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #34d399, #10b981);
        color: #050508;
        font-weight: 600;
        padding: 0.55rem 1rem;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .overs-input-row button:active {
        transform: translateY(1px);
      }

      .controls {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.8rem;
      }
      .controls button {
        border: none;
        border-radius: 12px;
        padding: 0.85rem;
        font-size: 1.1rem;
        font-weight: 600;
        background: linear-gradient(135deg, #ffb347, #ffcc33);
        color: #050508;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .controls button:active {
        transform: translateY(2px);
      }
      .controls button.extra {
        background: linear-gradient(135deg, #24d6ff, #3b82ff);
        color: #050b1a;
      }
      .history {
        margin-top: 1.75rem;
        padding: 1rem;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px dashed rgba(255, 255, 255, 0.3);
        min-height: 120px;
      }
      .history h4 {
        margin: 0 0 0.5rem;
        font-size: 0.9rem;
        color: #9cb3d5;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .history-line {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        font-size: 0.95rem;
      }
      .history-chip {
        background: rgba(255, 255, 255, 0.1);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .history-chip.wide,
      .history-chip.noball {
        background: rgba(255, 255, 255, 0.15);
        color: #5ef2e7;
      }
      .history-chip.wicket {
        background: rgba(255, 0, 90, 0.15);
        border-color: rgba(255, 0, 90, 0.4);
        color: #ff5e92;
      }
      .meta {
        margin-top: 1rem;
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #9cb3d5;
      }
      .meta span {
        display: flex;
        flex-direction: column;
        text-align: center;
      }
      .meta span strong {
        font-size: 1.1rem;
        color: #fff;
      }

      .status {
        margin: 0.5rem 0 0;
        font-size: 0.95rem;
        color: #76d7ff;
        text-align: center;
        letter-spacing: 0.1em;
      }
      @media (max-width: 640px) {
        body {
          padding: 1rem;
        }
        .score-grid {
          grid-template-columns: 1fr;
        }
        .controls {
          grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        }
        .meta {
          flex-direction: column;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <article class="card" aria-live="polite">
      <header class="header">
        <p class="title">Quick Turf Scorer</p>
        <p class="subtitle">Minimal view—focus on score, balls, and ball-by-ball log.</p>
      </header>
      <div class="overs-control">
        <label for="oversSelect">Match length</label>
        <div class="overs-input-row">
          <select id="oversSelect">
            <option value="1">1 over</option>
            <option value="2">2 overs</option>
            <option value="3">3 overs</option>
            <option value="4">4 overs</option>
            <option value="5">5 overs</option>
            <option value="6" selected>6 overs</option>
            <option value="7">7 overs</option>
            <option value="8">8 overs</option>
            <option value="10">10 overs</option>
          </select>
          <button id="setOversBtn">Apply</button>
        </div>
      </div>
      <section class="score-grid" aria-label="score totals">
        <div class="panel">
          <h3>Score</h3>
          <p id="scoreDisplay">0 / 0</p>
          <span>Runs / Wickets</span>
        </div>
        <div class="panel">
          <h3>Overs</h3>
          <p id="oversDisplay">0.0</p>
          <span>Completed overs</span>
        </div>
        <div class="panel">
          <h3>Balls</h3>
          <p id="ballsDisplay">0</p>
          <span>Legal balls</span>
        </div>
      </section>
      <section class="controls" aria-label="scoring actions">
        <button data-run="0">Dot</button>
        <button data-run="1">1 run</button>
        <button data-run="2">2 runs</button>
        <button data-run="3">3 runs</button>
        <button data-run="4">4 runs</button>
        <button data-run="6">6 runs</button>
        <button class="extra" data-extra="wide">Wide</button>
        <button class="extra" data-extra="noball">No Ball</button>
        <button class="extra" data-extra="wicket">Wicket</button>
      </section>
      <section class="history" aria-label="ball history">
        <h4>Ball-by-ball log</h4>
        <div id="historyLine" class="history-line">
          <span class="history-chip">none yet</span>
        </div>
        <div class="meta">
          <span>
            <strong id="currentOver">Over 1</strong>
            Current over
          </span>
          <span>
            <strong id="lastBall">-</strong>
            Last delivery
          </span>
        </div>
        <p class="status" id="statusMessage">Set overs and start scoring</p>
      </section>
    </article>
    <script>
      const scoreDisplay = document.getElementById("scoreDisplay");
      const oversDisplay = document.getElementById("oversDisplay");
      const ballsDisplay = document.getElementById("ballsDisplay");
      const historyLine = document.getElementById("historyLine");
      const currentOver = document.getElementById("currentOver");
      const lastBall = document.getElementById("lastBall");
      let runs = 0;
      let wickets = 0;
      let balls = 0;
      let legalBalls = 0;
      let history = [];

      function render() {
        const overs = Math.floor(legalBalls / 6);
        const rem = legalBalls % 6;
        scoreDisplay.textContent = `${runs} / ${wickets}`;
        ballsDisplay.textContent = legalBalls;
        oversDisplay.textContent = `${overs}.${rem}`;
        currentOver.textContent = `Over ${overs + 1}`;
        lastBall.textContent = history.length ? history[history.length - 1].label : "-";
        historyLine.innerHTML = history.length
          ? history
              .slice(-12)
              .map(
                (ball) =>
                  `<span class="history-chip ${ball.type}">${ball.label}</span>`
              )
              .join("")
          : '<span class="history-chip">none yet</span>';
      }

      function pushBall(label, type) {
        history.push({ label, type });
        if (history.length > 40) history.shift();
      }

      document.querySelectorAll("[data-run]").forEach((button) => {
        button.addEventListener("click", () => {
          const value = Number(button.dataset.run);
          runs += value;
          balls += 1;
          legalBalls += 1;
          if (value === 0) {
            pushBall("0", "dot");
          } else {
            pushBall(value.toString(), "run");
          }
          render();
        });
      });

      document.querySelectorAll("[data-extra]").forEach((button) => {
        button.addEventListener("click", () => {
          const type = button.dataset.extra;
          if (type === "wide") {
            runs += 1;
            pushBall("Wd", "wide");
          } else if (type === "noball") {
            runs += 1;
            pushBall("Nb", "noball");
          } else if (type === "wicket") {
            wickets += 1;
            balls += 1;
            legalBalls += 1;
            pushBall("W", "wicket");
          }
          render();
        });
      });

      render();
    </script>
  </body>
</html>
