<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Turf Score</title>
    <style>
      :root {
        font-family: "Inter", system-ui, sans-serif;
        color: #f8fbff;
        background: #0b1221;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(circle at top, #161d37, #05090f 65%);
      }
      .card {
        width: min(540px, 100%);
        background: rgba(8, 11, 20, 0.95);
        border-radius: 28px;
        padding: 2rem;
        box-shadow: 0 30px 60px rgba(3, 5, 15, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      .title {
        font-size: clamp(2rem, 4vw, 2.6rem);
        letter-spacing: 0.05em;
        margin: 0;
      }
      .subtitle {
        margin: 0;
        color: #8da1c9;
        font-size: 0.95rem;
      }
      .score-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
      .panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 1rem;
        border-radius: 16px;
        text-align: center;
      }
      .panel h3 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8da1c9;
      }
      .panel p {
        margin: 0.35rem 0 0;
        font-size: 1.9rem;
        font-weight: 600;
      }
      .panel span {
        display: block;
        font-size: 0.85rem;
        color: #9cb3d5;
        margin-top: 0.35rem;
      }
      .overs-control {
        margin-bottom: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
      }

      .overs-control label {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #9cb3d5;
      }

      .overs-input-row {
        margin-top: 0.4rem;
        display: flex;
        gap: 0.6rem;
        align-items: center;
      }

      .overs-input-row select {
        flex: 1;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
        padding: 0.55rem 0.75rem;
        font-size: 1rem;
      }

      .overs-input-row button {
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #34d399, #10b981);
        color: #050508;
        font-weight: 600;
        padding: 0.55rem 1rem;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .overs-input-row button:active {
        transform: translateY(1px);
      }

      .overs-input-row button.reset-btn {
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.05);
        color: #f8fbff;
        font-weight: 500;
        padding: 0.55rem 0.85rem;
      }

      .controls {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.8rem;
      }
      .controls button {
        border: none;
        border-radius: 12px;
        padding: 0.85rem;
        font-size: 1.1rem;
        font-weight: 600;
        background: linear-gradient(135deg, #ffb347, #ffcc33);
        color: #050508;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .controls button:active {
        transform: translateY(2px);
      }
      .controls button.extra {
        background: linear-gradient(135deg, #24d6ff, #3b82ff);
        color: #050b1a;
      }
      .history {
        margin-top: 1.75rem;
        padding: 1rem;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px dashed rgba(255, 255, 255, 0.3);
        min-height: 120px;
      }
      .history h4 {
        margin: 0 0 0.5rem;
        font-size: 0.9rem;
        color: #9cb3d5;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .history-line {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        font-size: 0.95rem;
        max-height: 220px;
        overflow-y: auto;
        padding-right: 0.35rem;
      }
      .history-chip {
        background: rgba(255, 255, 255, 0.1);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .history-chip.wide,
      .history-chip.noball {
        background: rgba(255, 255, 255, 0.15);
        color: #5ef2e7;
      }
      .history-chip.wicket {
        background: rgba(255, 0, 90, 0.15);
        border-color: rgba(255, 0, 90, 0.4);
        color: #ff5e92;
      }
      .over-log {
        margin-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 0.9rem;
      }
      .over-log h4 {
        margin: 0 0 0.5rem;
        font-size: 0.85rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #9cb3d5;
      }
      .over-history {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        max-height: 180px;
        overflow-y: auto;
      }
      .over-history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0.5rem;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.9rem;
        gap: 0.5rem;
      }
      .meta {
        margin-top: 1rem;
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #9cb3d5;
      }
      .meta span {
        display: flex;
        flex-direction: column;
        text-align: center;
      }
      .meta span strong {
        font-size: 1.1rem;
        color: #fff;
      }

      .status {
        margin: 0.5rem 0 0;
        font-size: 0.95rem;
        color: #76d7ff;
        text-align: center;
        letter-spacing: 0.1em;
      }
      @media (max-width: 640px) {
        body {
          padding: 1rem;
        }
        .score-grid {
          grid-template-columns: 1fr;
        }
        .controls {
          grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        }
        .meta {
          flex-direction: column;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <article class="card" aria-live="polite">
      <header class="header">
        <p class="title">Quick Turf Scorer</p>
        <p class="subtitle">Minimal view—focus on score, balls, and ball-by-ball log.</p>
      </header>
      <div class="overs-control">
        <label for="oversSelect">Match length</label>
        <div class="overs-input-row">
          <select id="oversSelect">
            <option value="1">1 over</option>
            <option value="2">2 overs</option>
            <option value="3">3 overs</option>
            <option value="4">4 overs</option>
            <option value="5">5 overs</option>
            <option value="6" selected>6 overs</option>
            <option value="7">7 overs</option>
            <option value="8">8 overs</option>
            <option value="10">10 overs</option>
          </select>
          <button id="setOversBtn">Apply</button>
          <button id="resetMatchBtn" type="button" class="reset-btn">Reset</button>
        </div>
      </div>
      <section class="score-grid" aria-label="score totals">
        <div class="panel">
          <h3>Score</h3>
          <p id="scoreDisplay">0 / 0</p>
          <span>Runs / Wickets</span>
        </div>
        <div class="panel">
          <h3>Overs</h3>
          <p id="oversDisplay">0.0</p>
          <span>Completed overs</span>
        </div>
        <div class="panel">
          <h3>Balls</h3>
          <p id="ballsDisplay">0</p>
          <span>Legal balls</span>
        </div>
      </section>
      <section class="controls" aria-label="scoring actions">
        <button data-run="0">Dot</button>
        <button data-run="1">1 run</button>
        <button data-run="2">2 runs</button>
        <button data-run="3">3 runs</button>
        <button data-run="4">4 runs</button>
        <button data-run="6">6 runs</button>
        <button class="extra" data-extra="wide">Wide</button>
        <button class="extra" data-extra="noball">No Ball</button>
        <button class="extra" data-extra="wicket">Wicket</button>
      </section>
      <section class="history" aria-label="ball history">
        <h4>Ball-by-ball log</h4>
        <div id="historyLine" class="history-line">
          <span class="history-chip">none yet</span>
        </div>
        <div class="over-log">
          <h4>Over log</h4>
          <div id="overHistoryList" class="over-history">
            <span class="history-chip">No overs yet</span>
          </div>
        </div>
        <div class="meta">
          <span>
            <strong id="currentOver">Over 1</strong>
            Current over
          </span>
          <span>
            <strong id="lastBall">-</strong>
            Last delivery
          </span>
        </div>
        <p class="status" id="statusMessage">Set overs and start scoring</p>
      </section>
    </article>
    <script>
      const scoreDisplay = document.getElementById("scoreDisplay");
      const oversDisplay = document.getElementById("oversDisplay");
      const ballsDisplay = document.getElementById("ballsDisplay");
      const historyLine = document.getElementById("historyLine");
      const overHistoryList = document.getElementById("overHistoryList");
      const currentOver = document.getElementById("currentOver");
      const lastBall = document.getElementById("lastBall");
      const statusMessage = document.getElementById("statusMessage");
      const oversSelect = document.getElementById("oversSelect");
      const setOversBtn = document.getElementById("setOversBtn");
      const resetMatchBtn = document.getElementById("resetMatchBtn");
      const runButtons = document.querySelectorAll("[data-run]");
      const extraButtons = document.querySelectorAll("[data-extra]");

      let runs = 0;
      let wickets = 0;
      let legalBalls = 0;
      let legalBallsThisOver = 0;
      let maxOvers = Number(oversSelect.value) || 6;
      let history = [];
      let overHistory = [];
      let currentOverBalls = [];
      let matchReady = false;
      let matchComplete = false;
      let lastBallLabel = "-";

      function resetMatchState() {
        runs = 0;
        wickets = 0;
        legalBalls = 0;
        legalBallsThisOver = 0;
        history = [];
        overHistory = [];
        currentOverBalls = [];
        lastBallLabel = "-";
        matchReady = false;
        matchComplete = false;
      }

      function formatOvers(ballCount) {
        const overs = Math.floor(ballCount / 6);
        const balls = ballCount % 6;
        return `${overs}.${balls}`;
      }

      function render() {
        scoreDisplay.textContent = `${runs} / ${wickets}`;
        ballsDisplay.textContent = legalBalls;
        oversDisplay.textContent = formatOvers(legalBalls);
        const nextOver = matchComplete ? maxOvers : Math.floor(legalBalls / 6) + 1;
        currentOver.textContent = `Over ${Math.min(nextOver, maxOvers)}`;
        lastBall.textContent = lastBallLabel;
        historyLine.innerHTML = history.length
          ? history
              .map(
                (entry) =>
                  `<span class="history-chip ${entry.type}">${entry.label}</span>`
              )
              .join("")
          : '<span class="history-chip">none yet</span>';
        renderOverHistory();
      }

      function renderOverHistory() {
        if (!overHistory.length && !currentOverBalls.length) {
          overHistoryList.innerHTML =
            '<span class="history-chip">Waiting for the first ball</span>';
          return;
        }
        const lines = [];
        overHistory.forEach((over) => {
          lines.push(
            `<div class="over-history-item"><span>Over ${over.over}</span><span>${over.balls.join(" ")}</span></div>`
          );
        });
        if (currentOverBalls.length && !matchComplete) {
          lines.push(
            `<div class="over-history-item"><span>Over ${
              overHistory.length + 1
            }</span><span>${currentOverBalls.join(" ")}</span></div>`
          );
        }
        overHistoryList.innerHTML = lines.join("");
      }

      function pushBall(label, type, legal) {
        history.push({ label, type });
        currentOverBalls.push(label);
        lastBallLabel = label;
        if (legal) {
          legalBalls += 1;
          legalBallsThisOver += 1;
          if (legalBallsThisOver >= 6) {
            overHistory.push({
              over: overHistory.length + 1,
              balls: [...currentOverBalls],
            });
            currentOverBalls = [];
            legalBallsThisOver = 0;
          }
        }
      }

      function evaluateMatchEnd() {
        if (wickets >= 10) {
          concludeMatch("All out");
          return true;
        }
        if (legalBalls >= maxOvers * 6) {
          concludeMatch("Overs complete");
          return true;
        }
        return false;
      }

      function concludeMatch(reason) {
        if (matchComplete) return;
        matchComplete = true;
        matchReady = false;
        if (currentOverBalls.length) {
          overHistory.push({
            over: overHistory.length + 1,
            balls: [...currentOverBalls],
          });
          currentOverBalls = [];
          legalBallsThisOver = 0;
        }
        const oversText = formatOvers(legalBalls);
        const message =
          reason === "All out"
            ? `Match complete (all out) - ${runs}/${wickets} in ${oversText} overs.`
            : `Match complete - ${runs}/${wickets} in ${oversText} overs.`;
        statusMessage.textContent = message;
        render();
      }

      function startNewMatch(message) {
        resetMatchState();
        matchReady = true;
        statusMessage.textContent = message;
        render();
      }

      function requireReady() {
        if (!matchReady) {
          statusMessage.textContent = "Choose overs and tap Apply to start.";
          return false;
        }
        if (matchComplete) {
          statusMessage.textContent = "Match finished. Reset to start again.";
          return false;
        }
        return true;
      }

      runButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (!requireReady()) return;
          const value = Number(button.dataset.run);
          runs += value;
          pushBall(value === 0 ? "0" : value.toString(), value === 0 ? "dot" : "run", true);
          if (!evaluateMatchEnd()) {
            render();
          }
        });
      });

      extraButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (!requireReady()) return;
          const type = button.dataset.extra;
          if (type === "wide") {
            runs += 1;
            pushBall("Wd", "wide", false);
            render();
          } else if (type === "noball") {
            runs += 1;
            pushBall("Nb", "noball", false);
            render();
          } else if (type === "wicket") {
            wickets += 1;
            pushBall("W", "wicket", true);
            if (!evaluateMatchEnd()) {
              render();
            }
          }
        });
      });

      setOversBtn.addEventListener("click", () => {
        maxOvers = Math.min(Math.max(Number(oversSelect.value) || 6, 1), 50);
        oversSelect.value = maxOvers;
        startNewMatch(`Overs locked at ${maxOvers}. Score away!`);
      });

      resetMatchBtn.addEventListener("click", () => {
        maxOvers = 6;
        oversSelect.value = "6";
        resetMatchState();
        statusMessage.textContent = "Match reset. Choose overs and tap Apply.";
        render();
      });

      resetMatchState();
      statusMessage.textContent = "Set overs and tap Apply to begin.";
      render();
    </script>
  </body>
</html>
